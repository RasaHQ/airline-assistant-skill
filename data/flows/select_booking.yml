flows:
  select_booking:
    description: list the user's bookings and ask them to select one
    if: False
    persisted_slots:
      - selected_booking_ref
    steps:
      - id: "reset_garbage"
        action: action_validate_booking_ref
        next:
          - if: "slots.selected_booking_ref is not null"
            then: END
          - else: "list"
      - id: "list"
        action: action_list_user_bookings
        next:
          - if: "slots.api_error"
            then: "no_bookings"
          - if: "slots.selected_booking_ref is not null"
            then: END
          - else: "pick"
      - id: "no_bookings"
        action: utter_no_bookings_found
        next: END
      - id: "pick"
        collect: selected_booking_ref
        description: "the booking reference (e.g. ABC123, XYZ789). If the user already identified a flight by date, destination or other detail that uniquely matches one listed booking, use that booking's reference."
        utter: utter_ask_selected_booking_ref
        next: END
